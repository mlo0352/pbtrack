<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Stopwatch with yellow water droplet favicon">
  <title>Stopwatch with yellow water droplet</title>
  <defs>
    <linearGradient id="dropYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe87a"/>
      <stop offset="100%" stop-color="#f4c400"/>
    </linearGradient>
  </defs>

  <!-- Stopwatch top -->
  <rect x="26" y="4" width="12" height="6" rx="2" fill="#1f2937"/>
  <rect x="40" y="8" width="8" height="4" rx="2" transform="rotate(35 44 10)" fill="#1f2937"/>

  <!-- Stopwatch body -->
  <circle cx="32" cy="34" r="22" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <circle cx="32" cy="34" r="17" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Stopwatch hands -->
  <circle cx="32" cy="34" r="2.5" fill="#1f2937"/>
  <path d="M32 34 L32 21" stroke="#1f2937" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M32 34 L42 30" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>

  <!-- Water drop -->
  <path d="M44 39 C44 32 38 27 32 20 C26 27 20 32 20 39 C20 46 25.4 52 32 52 C38.6 52 44 46 44 39 Z"
        fill="url(#dropYellow)" opacity="0.95"/>

  <!-- Inner highlight on drop -->
  <path d="M28 29 C24.5 33.5 23.5 36.2 23.5 39.2 C23.5 43.3 26.1 46.8 30 48.1"
        fill="none" stroke="#fff7c2" stroke-width="2.2" stroke-linecap="round" opacity="0.95"/>

  <!-- Subtle outline to keep drop readable at small sizes -->
  <path d="M44 39 C44 32 38 27 32 20 C26 27 20 32 20 39 C20 46 25.4 52 32 52 C38.6 52 44 46 44 39 Z"
        fill="none" stroke="#9a7b00" stroke-width="1.2" opacity="0.55"/>
</svg>
